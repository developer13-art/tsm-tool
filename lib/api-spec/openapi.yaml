openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: TSM Pro API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: devices
    description: Device management
  - name: mdm-packages
    description: MDM package management
  - name: jobs
    description: Job management
  - name: users
    description: User management
  - name: stats
    description: Dashboard statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid input or user exists

  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List all devices
      responses:
        "200":
          description: List of devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"
    post:
      operationId: createDevice
      tags: [devices]
      summary: Register a new device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInput"
      responses:
        "201":
          description: Device created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

  /devices/scan:
    post:
      operationId: scanDevices
      tags: [devices]
      summary: Scan for new devices (simulated)
      responses:
        "200":
          description: Scan complete with discovered devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Device"

  /devices/{id}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get a single device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Device details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "404":
          description: Device not found

    patch:
      operationId: updateDevice
      tags: [devices]
      summary: Update a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceUpdate"
      responses:
        "200":
          description: Device updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

    delete:
      operationId: deleteDevice
      tags: [devices]
      summary: Delete a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Device deleted

  /devices/{id}/reboot:
    post:
      operationId: rebootDevice
      tags: [devices]
      summary: Reboot device to specified mode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RebootInput"
      responses:
        "200":
          description: Reboot initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"

  /mdm-packages:
    get:
      operationId: listMdmPackages
      tags: [mdm-packages]
      summary: List all known MDM packages
      responses:
        "200":
          description: List of MDM packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MdmPackage"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      summary: List all jobs
      responses:
        "200":
          description: List of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Job"
    post:
      operationId: createJob
      tags: [jobs]
      summary: Create a new MDM removal job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobInput"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      summary: Get job details with logs
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job details with logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobWithLogs"
        "404":
          description: Job not found

  /jobs/{id}/logs:
    get:
      operationId: getJobLogs
      tags: [jobs]
      summary: Get logs for a job
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobLog"

  /jobs/{id}/run:
    post:
      operationId: runJob
      tags: [jobs]
      summary: Execute a pending job (simulate MDM removal)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted

  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/activity:
    get:
      operationId: getActivityFeed
      tags: [stats]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [username, password, email]
      properties:
        username:
          type: string
        password:
          type: string
        email:
          type: string

    AuthUser:
      type: object
      required: [id, username, email, role]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, technician]

    User:
      type: object
      required: [id, username, email, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, technician]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [username, email, password, role]
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [admin, technician]

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, technician]
        password:
          type: ["string", "null"]

    Device:
      type: object
      required: [id, serialNumber, model, brand, chipset, status, mode, bootloaderStatus, createdAt]
      properties:
        id:
          type: integer
        serialNumber:
          type: string
        model:
          type: string
        brand:
          type: string
        chipset:
          type: string
        androidVersion:
          type: ["string", "null"]
        imei:
          type: ["string", "null"]
        status:
          type: string
          enum: [online, offline, busy, error]
        mode:
          type: string
          enum: [normal, fastboot, recovery, edl, sideload]
        bootloaderStatus:
          type: string
          enum: [locked, unlocked, unknown]
        agentConnected:
          type: boolean
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    DeviceInput:
      type: object
      required: [serialNumber, model, brand, chipset]
      properties:
        serialNumber:
          type: string
        model:
          type: string
        brand:
          type: string
        chipset:
          type: string
        androidVersion:
          type: string
        imei:
          type: string
        notes:
          type: string

    DeviceUpdate:
      type: object
      properties:
        model:
          type: string
        brand:
          type: string
        chipset:
          type: string
        androidVersion:
          type: string
        imei:
          type: string
        status:
          type: string
          enum: [online, offline, busy, error]
        mode:
          type: string
          enum: [normal, fastboot, recovery, edl, sideload]
        bootloaderStatus:
          type: string
          enum: [locked, unlocked, unknown]
        notes:
          type: string

    RebootInput:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [normal, fastboot, recovery, edl, sideload]

    MdmPackage:
      type: object
      required: [id, packageName, displayName, vendor, chipsets, description]
      properties:
        id:
          type: integer
        packageName:
          type: string
        displayName:
          type: string
        vendor:
          type: string
        chipsets:
          type: array
          items:
            type: string
        description:
          type: string

    Job:
      type: object
      required: [id, deviceId, packageId, status, createdAt]
      properties:
        id:
          type: integer
        deviceId:
          type: integer
        packageId:
          type: integer
        deviceName:
          type: ["string", "null"]
        packageName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: ["integer", "null"]
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string

    JobInput:
      type: object
      required: [deviceId, packageId]
      properties:
        deviceId:
          type: integer
        packageId:
          type: integer
        notes:
          type: string

    JobWithLogs:
      type: object
      required: [id, deviceId, packageId, status, createdAt, logs]
      properties:
        id:
          type: integer
        deviceId:
          type: integer
        packageId:
          type: integer
        deviceName:
          type: ["string", "null"]
        packageName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: ["integer", "null"]
        startedAt:
          type: ["string", "null"]
        completedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        logs:
          type: array
          items:
            $ref: "#/components/schemas/JobLog"

    JobLog:
      type: object
      required: [id, jobId, level, message, createdAt]
      properties:
        id:
          type: integer
        jobId:
          type: integer
        level:
          type: string
          enum: [info, success, warning, error, debug]
        message:
          type: string
        createdAt:
          type: string

    DashboardStats:
      type: object
      required: [totalDevices, onlineDevices, totalJobs, completedJobs, failedJobs, pendingJobs, totalUsers]
      properties:
        totalDevices:
          type: integer
        onlineDevices:
          type: integer
        offlineDevices:
          type: integer
        totalJobs:
          type: integer
        completedJobs:
          type: integer
        failedJobs:
          type: integer
        pendingJobs:
          type: integer
        runningJobs:
          type: integer
        totalUsers:
          type: integer
        totalMdmPackages:
          type: integer

    ActivityEntry:
      type: object
      required: [id, type, message, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [device_added, device_rebooted, job_created, job_completed, job_failed, user_created, scan_completed]
        message:
          type: string
        createdAt:
          type: string
        metadata:
          type: ["string", "null"]
